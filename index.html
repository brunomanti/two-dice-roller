<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="A fair, responsive two-dice roller." />
    <title>Two Dice Roller</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="card">
        <p class="eyebrow">Fair random roller</p>
        <h1 id="app-title">Two Dice</h1>
        <p class="subtitle">Tap the button or either die. Rolls use cryptographic randomness with rejection sampling for unbiased 1–6 results.</p>

        <div class="dice-row" aria-live="polite" aria-label="Dice results">
          <button class="die" id="die-one" type="button" aria-label="Die one: 1" data-value="1">⚀</button>
          <button class="die" id="die-two" type="button" aria-label="Die two: 1" data-value="1">⚀</button>
        </div>

        <div class="result-panel" aria-live="polite">
          <span class="label">Total</span>
          <strong id="total">2</strong>
          <span id="combo" class="combo">1 + 1</span>
        </div>

        <button id="roll-button" class="roll-button" type="button">Roll dice</button>

        <p class="hint">Keyboard: press <kbd>Space</kbd> or <kbd>Enter</kbd> on the roll button.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
